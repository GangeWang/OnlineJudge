version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - HOST_BACKEND_DIR=${HOST_BACKEND_DIR:-${PWD}/backend}
      - MARIADB_HOST=host.docker.internal
      - MARIADB_PORT=3306
      - MARIADB_USER=onlinejudge
      - MARIADB_PASSWORD=onlinejudge
      - MARIADB_DATABASE=onlinejudge
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend:/app
volumes:
  mariadb-data:
